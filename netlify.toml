[build]
command = "npm run build"
publish = "apps/web/dist"
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"
included_files = ["databricks/**"]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
